<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker d'Entraînement</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --text: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }
        header {
            background-color: var(--surface);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        nav {
            display: flex;
            justify-content: space-around;
            background-color: var(--surface);
            padding: 10px;
            position: sticky;
            top: 0;
        }
        button {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button.active {
            background-color: var(--primary);
            color: var(--bg);
        }
        .container {
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }
        .view {
            display: none;
        }
        .view.active {
            display: block;
        }
        .exercise {
            background-color: var(--surface);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .exercise h3 {
            margin-top: 0;
            font-size: 1.1em;
        }
        .exercise p {
            font-size: 0.85em;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .sets {
            display: flex;
            gap: 10px;
        }
        input {
            width: 100%;
            background-color: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        .btn-save, .btn-export {
            display: block;
            width: 100%;
            background-color: var(--primary);
            color: var(--bg);
            padding: 15px;
            font-size: 1.1em;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        th, td {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }
    </style>
</head>
<body>

    <header>
        <h2>Workout Tracker</h2>
    </header>

    <nav>
        <button id="navA" class="active" onclick="switchView('A')">Séance A</button>
        <button id="navB" onclick="switchView('B')">Séance B</button>
        <button id="navHistory" onclick="switchView('History')">Historique</button>
    </nav>

    <div class="container">
        
        <div id="viewA" class="view active">
            <form id="formA">
                <div class="exercise">
                    <h3>1. Split Squat</h3>
                    <p>3 séries | 10-12 reps/jambe | Dos droit, appui stable</p>
                    <div class="sets">
                        <input type="text" name="A_Ex1_S1" placeholder="S1 (ex: 12/12)">
                        <input type="text" name="A_Ex1_S2" placeholder="S2">
                        <input type="text" name="A_Ex1
